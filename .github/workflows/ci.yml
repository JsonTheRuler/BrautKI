name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  gateway-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gateway/package-lock.json
      - run: npm ci
      - run: npm run build

  python-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Agents checks
        run: |
          python -m pip install -e .
          python -m compileall src
          python -m agents.scripts.test_core_agents
        working-directory: agents

      - name: Data checks
        run: |
          python -m pip install -e .
          python -m compileall src alembic
          alembic -c alembic.ini history
        working-directory: data

      - name: Council checks
        run: |
          python -m pip install -e .
          python -m compileall src
        working-directory: governance/llm-council
