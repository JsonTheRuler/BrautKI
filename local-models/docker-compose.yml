services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 5m

  gemma-openai-wrapper:
    build:
      context: .
      dockerfile: Dockerfile.wrapper
    restart: unless-stopped
    ports:
      - "11500:11500"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WRAPPER_MODE: gemma
      WRAPPER_MODEL: gemma3:27b
      WRAPPER_PORT: 11500
    depends_on:
      - ollama

  karpathy-wrapper:
    build:
      context: .
      dockerfile: Dockerfile.wrapper
    restart: unless-stopped
    ports:
      - "11600:11600"
    environment:
      WRAPPER_MODE: karpathy
      WRAPPER_PORT: 11600
      KARPATHY_BINARY_PATH: /models/llm_c_runner
      KARPATHY_MODEL_PATH: /models/model.bin
    volumes:
      - ./karpathy/models:/models

volumes:
  ollama_data:
