models:
  reasoning-primary:
    provider: anthropic
    providerModel: claude-3-7-sonnet-latest
  fast-cheap:
    provider: openrouter
    providerModel: openai/gpt-4o-mini
  internal-secure:
    provider: local-http
    providerModel: gemma3:27b
    baseUrl: ${LOCAL_GEMMA_BASE_URL:-http://localhost:11500}
