  council-meta:
    provider: local-http
    providerModel: council-router
    baseUrl: ${COUNCIL_BASE_URL:-http://localhost:8088}
    path: /council/decide
  karpathy-eval:
    provider: local-http
    providerModel: karpathy-eval
    baseUrl: ${KARPATHY_BASE_URL:-http://localhost:11600}
    path: /v1/chat/completions
